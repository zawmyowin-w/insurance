# =============================================================================
#  Local Development Profile  (localhost only)
#  Usage:  mvn spring-boot:run -Dspring-boot.run.profiles=local
#          or set env var:  SPRING_PROFILES_ACTIVE=local
# =============================================================================

# ── Server ───────────────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── MySQL (local) ─────────────────────────────────────────────────────────────
# Import database/local_mysql.sql first, then start the backend.
# If your MySQL root has a password, set DB_PASSWORD as an env var
# or replace the empty string below with your password.
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
# 'update' adds missing columns without dropping existing data.
# Use 'create-drop' on a blank DB if you want Hibernate to build the schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── CORS ─────────────────────────────────────────────────────────────────────
# Vite dev server runs on 5173; allow both ports for convenience.
app.cors.allowed-origins=http://localhost:5173,http://localhost:5000

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:LocalDevInsurancePortalSecretKey2024VeryLongSecureKeyForHMACSHA256}
app.jwt.expiration=86400000

# ── Admin bootstrap ───────────────────────────────────────────────────────────
app.admin.email=${ADMIN_EMAIL:admin@dicp.com.mm}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# ── File upload ───────────────────────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.insurance=DEBUG
logging.level.org.springframework.security=WARN
