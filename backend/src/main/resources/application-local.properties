# ─────────────────────────────────────────────────────────────────────────────
# Local development profile
# Run with:  cd backend && mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Edit this file directly for your local MySQL password and settings.
# ─────────────────────────────────────────────────────────────────────────────

# ── MySQL ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:insurance_portal}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
# Set DB_PASSWORD in your shell if your local MySQL user has a password.
spring.datasource.password=${DB_PASSWORD:}

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5000,http://localhost:5173

# ── File uploads ──────────────────────────────────────────────────────────────
app.upload.dir=${FILE_STORAGE_DIR:./uploads}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.insurance=DEBUG
logging.level.org.springframework.security=INFO
