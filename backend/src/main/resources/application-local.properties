# ─────────────────────────────────────────────────────────────────────────────
# Local development profile — loaded when you run:
#   bash run-local.sh   (Mac/Linux)
#   run-local.bat       (Windows)
#
# Extends application.properties — only overrides listed here.
# No Replit, no socket, no cloud — pure localhost.
# ─────────────────────────────────────────────────────────────────────────────

# ── MySQL (standard TCP — your local MySQL service) ───────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_portal\
  ?useSSL=false\
  &serverTimezone=UTC\
  &allowPublicKeyRetrieval=true\
  &createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}

# ── CORS — only localhost origins ─────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5000,http://localhost:5173

# ── File uploads — stored next to the backend folder ─────────────────────────
app.upload.dir=./uploads

# ── Logging — more verbose locally ───────────────────────────────────────────
logging.level.com.insurance=DEBUG
logging.level.org.springframework.security=INFO
