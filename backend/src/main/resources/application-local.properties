# ─────────────────────────────────────────────────────────────────────────────
# Local development profile
# Run with:  cd backend && mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Edit this file directly for your local MySQL password and settings.
# ─────────────────────────────────────────────────────────────────────────────

# ── MySQL ─────────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
# Set your MySQL root password below. Leave blank if no password.
spring.datasource.password=

# ── CORS ──────────────────────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5000,http://localhost:5173

# ── File uploads ──────────────────────────────────────────────────────────────
app.upload.dir=./uploads

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.insurance=DEBUG
logging.level.org.springframework.security=INFO
