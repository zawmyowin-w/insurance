# ─── Server ───
server.port=8080
server.servlet.context-path=/api
spring.application.name=insurance-portal

# ─── MySQL Database (Production / Local) ───
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JWT ───
# JWT_SECRET env var MUST be set in production (no fallback — fails fast if missing)
# For dev: set a value in application-dev.properties instead
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=86400000

# ─── Admin Bootstrap ───
# ADMIN_EMAIL and ADMIN_PASSWORD MUST be set via env vars in production (fail fast if missing)
# Dev fallbacks are provided in application-dev.properties only
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# ─── File Upload ───
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads

# ─── CORS ───
# Set CORS_ALLOWED_ORIGINS env var in production (comma-separated list)
# Falls back to localhost for dev convenience when env var not set
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5000}

# ─── Logging ───
logging.level.com.insurance=INFO
logging.level.org.springframework.security=WARN

# ─── SpringDoc / Swagger ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
