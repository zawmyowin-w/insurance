# ─── Server ───
server.port=8080
server.servlet.context-path=/api
spring.application.name=insurance-portal

# ─── MySQL Database (Production / Local) ───
spring.datasource.url=jdbc:mysql://localhost:3306/insurance_portal?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── JWT ───
# Override with JWT_SECRET env var in production
app.jwt.secret=${JWT_SECRET:LocalDevInsurancePortalSecretKey2024VeryLongSecureKeyForHMACSHA256}
app.jwt.expiration=86400000

# ─── Admin Bootstrap ───
# Override with ADMIN_EMAIL / ADMIN_PASSWORD env vars in production
app.admin.email=${ADMIN_EMAIL:admin@dicp.com.mm}
app.admin.password=${ADMIN_PASSWORD:Admin@123}

# ─── File Upload ───
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
app.upload.dir=./uploads

# ─── CORS ───
# Set CORS_ALLOWED_ORIGINS env var in production (comma-separated list)
# Falls back to localhost for dev convenience when env var not set
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5000}

# ─── Logging ───
logging.level.com.insurance=INFO
logging.level.org.springframework.security=WARN

# ─── SpringDoc / Swagger ───
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ─── Auto-Check Scheduler ───
# Myanmar time = UTC+6:30
# 9 AM Myanmar = 2:30 AM UTC  → cron: 0 30 2 * * *
# 8 AM Myanmar = 1:30 AM UTC  → cron: 0 30 1 * * *
app.autocheck.verify-cron=${AUTOCHECK_VERIFY_CRON:0 30 2 * * *}
app.autocheck.reminder-cron=${AUTOCHECK_REMINDER_CRON:0 30 1 * * *}
app.autocheck.enabled=${AUTOCHECK_ENABLED:true}
# Minimum hours a payment must be PENDING before auto-verify (gives admin time to reject)
app.autocheck.min-pending-hours=${AUTOCHECK_MIN_PENDING_HOURS:1}
# Auto-cancel REVISION_REQUESTED applications/claims not answered within 7 days (03:00 UTC daily)
app.autocheck.revision-cleanup-cron=${AUTOCHECK_REVISION_CLEANUP_CRON:0 0 3 * * *}
