# ─── H2 In-Memory (Development / Testing) ───
spring.datasource.url=jdbc:h2:mem:insurance_portal;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

logging.level.com.insurance=DEBUG

# ─── Dev-only secrets (NEVER use in production) ───
# In production, set JWT_SECRET, ADMIN_EMAIL, ADMIN_PASSWORD as environment variables
app.jwt.secret=DevOnlyInsurancePortalSecretKey2024VeryLongSecureKeyForHMACSHA256Signing
app.admin.email=admin@dicp.com.mm
app.admin.password=Admin@123
